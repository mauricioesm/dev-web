<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SELOEDU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page">
    <main class="login-main">
        <div class="login-wrapper">
            <div class="login-card">
                <h1>Entrar no SELOEDU</h1>
                <p>Use seu e-mail de coordenador para acessar o painel.</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="flash-stack">
                            {% for category, message in messages %}
                                <div class="flash {{ category }}">{{ message }}</div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" name="email" value="{{ email or '' }}" required>

                    <label for="password">Senha</label>
                    <input id="password" type="password" name="password" required>

                    <button type="submit" class="primary-btn full-width">Entrar</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
