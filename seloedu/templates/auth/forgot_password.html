{% extends "base.html" %}
{% block title %}Recuperar Senha - SELOEDU{% endblock %}
{% block content %}
<div class="wrap">
  <div class="card">
    <h1>Recuperar senha</h1>
    <p>Informe seu e-mail para gerar um link de redefinição.</p>

    <form method="POST">
      <label for="email">E-mail</label>
      <input id="email" type="email" name="email" required>
      <button type="submit" class="primary-btn">Gerar link de redefinição</button>
    </form>

    {% if message %}
      <p class="message {{ message_category }}">{{ message }}</p>
    {% endif %}

    <a class="link-btn back-link" href="{{ url_for('auth.login') }}">Voltar para login</a>
  </div>
</div>
{% endblock %}
