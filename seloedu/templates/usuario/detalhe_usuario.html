{% extends "base.html" %}

{% block title %}Usuário #{{ usuario.id }} - SELOEDU{% endblock %}

{% block content %}
  <h2>Detalhes do Usuário</h2>
  <p><strong>ID:</strong> {{ usuario.id }}</p>
  <p><strong>Nome:</strong> {{ usuario.nome }}</p>
  <p><strong>Email:</strong> {{ usuario.email }}</p>
  <p><strong>Papel:</strong> {{ usuario.funcao }}</p>

  <p>
    <a href="{{ url_for('usuario.listar') }}">Voltar</a>
  </p>

  <p>
    <a href="{{ url_for('usuario.modificar', id=usuario.id) }}"> Modificar </a>
  </p>

  <p>
    <a href="{{ url_for('usuario.deletar', id=usuario.id) }}"> Deletar </a>
  </p>

  
{% endblock %}
