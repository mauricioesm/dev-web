{% extends "base.html" %}
{% block title %}Redefinir Senha - SELOEDU{% endblock %}
{% block content %}
<div class="wrap">
  <div class="card">
    <h1>Redefinir senha</h1>
    <p>Defina uma nova senha para sua conta.</p>
    {% if message %}
      <p class="message {{ message_category }}">{{ message }}</p>
    {% endif %}
    <form method="POST" action="{{ url_for('auth.reset_password') }}">
      <input type="hidden" name="token" value="{{ token }}">
      <label for="password">Nova senha</label>
      <input id="password" type="password" name="password" required>
      <button type="submit" class="primary-btn">Salvar nova senha</button>
    </form>
    <a class="link-btn back-link" href="{{ url_for('auth.login') }}">Voltar para login</a>
  </div>
</div>
{% endblock %}
